name: Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> $GITHUB_OUTPUT

      - name: Package zip
        run: cd dist && zip -r ../hydromonk-${{ steps.version.outputs.version }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydromonk-${{ steps.version.outputs.version }}
          path: hydromonk-${{ steps.version.outputs.version }}.zip
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: HydroMonk v${{ steps.version.outputs.version }}
          body: |
            ## 💧 HydroMonk v${{ steps.version.outputs.version }}

            ### What's included
            - Smart drink water reminders with active hours window
            - Animated water fill circle with daily progress tracking
            - Streak tracking & badge on extension icon
            - 14 rotating science-backed hydration facts
            - Snooze support directly from notification
            - Benefits panel with 8 evidence-based water benefits
            - Weight-based daily goal calculator

            ### Install
            1. Download `hydromonk-${{ steps.version.outputs.version }}.zip`
            2. Go to `chrome://extensions` → Enable Developer mode
            3. Click **Load unpacked** → select the extracted folder
          files: hydromonk-${{ steps.version.outputs.version }}.zip
          make_latest: true
